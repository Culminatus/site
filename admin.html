<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Paneli - Mega Yapı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  body{background:var(--paper);}
  .admin-container{max-width:1000px;margin:0 auto;padding:40px 32px;}
  .admin-header{margin-bottom:40px;border-bottom:2px solid var(--line);padding-bottom:20px;}
  .admin-header h1{color:var(--ink);margin-bottom:5px;}
  .admin-header p{color:var(--steel);font-size:14px;}
  
  .form-section{background:var(--white);padding:30px;border-radius:8px;margin-bottom:40px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .form-section h2{font-size:22px;margin-bottom:24px;color:var(--ink);}
  
  .form-group{margin-bottom:20px;}
  label{display:block;font-weight:600;margin-bottom:8px;color:var(--ink);font-size:14px;}
  input[type="text"],input[type="number"],textarea,select{
    width:100%;
    padding:12px;
    border:1px solid var(--line);
    border-radius:4px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    transition:border-color .25s ease;
  }
  input[type="text"]:focus,input[type="number"]:focus,textarea:focus,select:focus{
    outline:none;
    border-color:var(--red);
    box-shadow:0 0 0 3px rgba(200,105,60,0.1);
  }
  
  textarea{resize:vertical;min-height:100px;}
  
  input[type="file"]{
    padding:8px;
    border:2px dashed var(--line);
    border-radius:4px;
    cursor:pointer;
    transition:border-color .25s ease;
  }
  input[type="file"]:hover{
    border-color:var(--red);
  }
  
  #imagePreview{margin-top:16px;}
  
  .form-actions{display:flex;gap:12px;margin-top:30px;}
  .form-actions .btn{margin:0;}
  
  #submitBtn{background:var(--red);color:var(--white);border:none;}
  #submitBtn:hover{background:var(--red-deep);}
  
  #cancelBtn{background:var(--steel);color:var(--white);border:none;}
  #cancelBtn:hover{background:#4a4a52;}
  
  .projects-table{background:var(--white);border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .projects-table table{width:100%;border-collapse:collapse;}
  .projects-table th{
    background:var(--ink);
    color:var(--white);
    padding:16px;
    text-align:left;
    font-weight:600;
    font-size:14px;
  }
  .projects-table td{
    padding:16px;
    border-bottom:1px solid var(--line);
    font-size:14px;
  }
  .projects-table tr:hover{background:rgba(200,105,60,0.05);}
  
  .projects-table .actions{display:flex;gap:8px;}
  .btn-edit,.btn-delete{
    padding:8px 12px;
    font-size:12px;
    border:none;
    border-radius:4px;
    cursor:pointer;
    transition:all .25s ease;
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:0.05em;
  }
  .btn-edit{
    background:var(--red);
    color:var(--white);
  }
  .btn-edit:hover{background:var(--red-deep);}
  
  .btn-delete{
    background:#e74c3c;
    color:var(--white);
  }
  .btn-delete:hover{background:#c0392b;}
  
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-top:30px;}
  .stat-card{
    background:var(--white);
    padding:20px;
    border-radius:8px;
    border-left:4px solid var(--red);
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  .stat-card .number{
    font-size:32px;
    font-weight:700;
    color:var(--red);
    font-family:'Fraunces',serif;
  }
  .stat-card .label{
    font-size:13px;
    color:var(--steel);
    margin-top:8px;
    text-transform:uppercase;
    letter-spacing:0.05em;
  }
  
  .no-projects{
    text-align:center;
    padding:40px;
    color:var(--steel);
  }
  
  .admin-nav{background:var(--ink);padding:20px 0;margin-bottom:40px;}
  .admin-nav .wrap{display:flex;justify-content:space-between;align-items:center;}
  .admin-nav a{color:rgba(255,255,255,0.8);text-decoration:none;font-weight:500;transition:color .25s ease;}
  .admin-nav a:hover{color:#fff;}
  .admin-logo{color:var(--red);font-weight:700;font-size:18px;}
</style>
</head>
<body>

<div class="admin-nav">
  <div class="wrap">
    <a href="index.html" class="admin-logo">← Siteye Dön</a>
    <h1 style="color:#fff;margin:0;font-size:20px;">Mega Yapı Admin Paneli</h1>
  </div>
</div>

<div class="admin-container">
  <div class="admin-header">
    <h1>Proje Yönetimi</h1>
    <p>Projeleri ekleyin, düzenleyin ve silin</p>
  </div>
  
  <!-- Form Section -->
  <div class="form-section">
    <h2 id="formTitle">Yeni Proje Ekle</h2>
    <form id="projectForm">
      <input type="hidden" id="currentProjectId">
      
      <div class="form-group">
        <label for="projectName">Proje Adı *</label>
        <input type="text" id="projectName" required>
      </div>
      
      <div class="form-group">
        <label for="projectYear">Yapım Yılı *</label>
        <input type="number" id="projectYear" min="1989" max="2100" required>
      </div>
      
      <div class="form-group">
        <label for="projectUnitCount">Bağımsız Bölüm Sayısı *</label>
        <input type="number" id="projectUnitCount" min="1" required>
      </div>
      
      <div class="form-group">
        <label for="projectAddress">Adres *</label>
        <input type="text" id="projectAddress" placeholder="Örn: Yeşilköy Mahallesi, Bakırköy / İstanbul" required>
      </div>
      
      <div class="form-group">
        <label for="projectDescription">Açıklama</label>
        <textarea id="projectDescription" placeholder="Proje hakkında ek bilgiler..."></textarea>
      </div>
      
      <div class="form-group">
        <label for="projectImage">Proje Fotoğrafı</label>
        <input type="file" id="projectImage" accept="image/*">
        <p style="font-size:12px;color:var(--steel);margin-top:8px;">JPG, PNG vb. dosyaları yükleyebilirsiniz. Maksimum 5MB.</p>
        <div id="imagePreview"></div>
      </div>
      
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="submitBtn">Proje Ekle</button>
        <button type="button" class="btn" id="cancelBtn" style="display:none;background:var(--steel);color:var(--white);border:none;cursor:pointer;">İptal</button>
      </div>
    </form>
  </div>
  
  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="number" id="projectCount">0</div>
      <div class="label">Toplam Proje</div>
    </div>
  </div>
  
  <!-- Projects Table -->
  <div class="form-section" style="margin-top:40px;">
    <h2>Projeler</h2>
    <div class="projects-table">
      <table>
        <thead>
          <tr>
            <th>Proje Adı</th>
            <th>Yapım Yılı</th>
            <th>Bölüm Sayısı</th>
            <th>İşlemler</th>
          </tr>
        </thead>
        <tbody id="projectsList">
          <tr>
            <td colspan="4" class="no-projects">Henüz proje eklenmemiştir</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="assets/js/app.js"></script>
<script src="assets/js/admin.js"></script>

</body>
</html>
